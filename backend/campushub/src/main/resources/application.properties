# Serveur
server.port=8080
spring.application.name=campushub

# Neon PostgreSQL
spring.datasource.url=jdbc:postgresql://neondb_owner:npg_eAYkrvb8ou2l@ep-cold-rain-abr4f4u6-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_eAYkrvb8ou2l
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions (optimisé pour Neon)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000


# JPA / Hibernate ? crée les tables automatiquement depuis tes @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SSL pour Neon
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require
# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.tn.enicarthage.campushub=DEBUG
logging.level.com.zaxxer.hikari=INFO

# Fichier de log
logging.file.name=logs/campushub.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# Configuration CORS
# ========================================
spring.web.cors.allowed-origins=http://localhost:4200
