<!-- Bouton flottant -->
<div *ngIf="!isOpen" class="fixed bottom-6 right-6 z-50">
    <button (click)="toggleChat()"
        class="w-16 h-16 bg-gradient-to-br from-primary to-secondary rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center text-white animate-bounce-slow">
        <span class="text-3xl">🤖</span>
        <span
            class="absolute top-0 right-0 w-4 h-4 bg-green-500 rounded-full border-2 border-white animate-pulse"></span>
    </button>
</div>

<!-- Widget Chatbot -->
<div *ngIf="isOpen"
    class="fixed bottom-6 right-6 z-50 flex flex-col bg-white rounded-2xl shadow-2xl border border-gray-200"
    [ngClass]="isMinimized ? 'w-80 h-16' : 'w-96 h-[600px]'" style="transition: all 0.3s ease;">

    <!-- Header -->
    <div class="bg-gradient-to-r from-primary to-secondary text-white px-6 py-4 rounded-t-2xl flex items-center justify-between cursor-pointer"
        (click)="minimizeChat()">
        <div class="flex items-center gap-3">
            <div class="relative">
                <span class="text-3xl">🤖</span>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-white"></span>
            </div>
            <div>
                <h3 class="font-bold text-lg">Claude</h3>
                <p class="text-xs opacity-90">Assistant ENICarthage</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button (click)="$event.stopPropagation(); minimizeChat()"
                class="hover:bg-white hover:bg-opacity-20 p-2 rounded-lg transition">
                <span *ngIf="!isMinimized">➖</span>
                <span *ngIf="isMinimized">⬆️</span>
            </button>
            <button (click)="$event.stopPropagation(); closeChat()"
                class="hover:bg-white hover:bg-opacity-20 p-2 rounded-lg transition">
                ✕
            </button>
        </div>
    </div>

    <!-- Contenu (caché si minimisé) -->
    <div *ngIf="!isMinimized" class="flex-1 flex flex-col overflow-hidden">

        <!-- Messages -->
        <div #messagesContainer class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">

            <div *ngFor="let message of messages" class="flex"
                [ngClass]="message.auteur === 'user' ? 'justify-end' : 'justify-start'">

                <!-- Message utilisateur -->
                <div *ngIf="message.auteur === 'user'"
                    class="max-w-[75%] bg-primary text-white rounded-2xl rounded-tr-none px-4 py-3 shadow">
                    <p class="text-sm whitespace-pre-wrap">{{ message.texte }}</p>
                    <p class="text-xs opacity-75 mt-1">{{ getMessageTime(message.timestamp) }}</p>
                </div>

                <!-- Message bot -->
                <div *ngIf="message.auteur === 'bot'" class="max-w-[85%] flex gap-2">
                    <div
                        class="flex-shrink-0 w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white text-sm">
                        🤖
                    </div>
                    <div>
                        <div class="bg-white rounded-2xl rounded-tl-none px-4 py-3 shadow border border-gray-200">
                            <p class="text-sm text-gray-800 whitespace-pre-wrap"
                                [innerHTML]="message.texte | markdownToHtml"></p>
                            <p class="text-xs text-gray-500 mt-1">{{ getMessageTime(message.timestamp) }}</p>
                        </div>

                        <!-- Actions -->
                        <div *ngIf="message.actions && message.actions.length > 0" class="mt-2 flex flex-col gap-2">
                            <button *ngFor="let action of message.actions" (click)="executerAction(action)"
                                class="bg-white border-2 border-primary text-primary px-4 py-2 rounded-lg text-sm font-semibold hover:bg-primary hover:text-white transition text-left flex items-center gap-2">
                                {{ action.label }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Indicateur de frappe -->
            <div *ngIf="isTyping" class="flex justify-start">
                <div class="flex gap-2">
                    <div
                        class="flex-shrink-0 w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white text-sm">
                        🤖
                    </div>
                    <div class="bg-white rounded-2xl rounded-tl-none px-4 py-3 shadow border border-gray-200">
                        <div class="flex gap-1">
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"
                                style="animation-delay: 0s;"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"
                                style="animation-delay: 0.2s;"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"
                                style="animation-delay: 0.4s;"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Message d'accueil si vide -->
            <div *ngIf="messages.length === 0" class="text-center py-8 text-gray-500">
                <p class="text-4xl mb-3">👋</p>
                <p class="text-sm">Démarrez la conversation...</p>
            </div>
        </div>

        <!-- Suggestions rapides -->
        <div class="px-4 py-2 bg-white border-t border-gray-200">
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button (click)="chatbotService.executerAction({label: 'Réserver', type: 'function', data: 'reserver'})"
                    class="flex-shrink-0 px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-medium hover:bg-blue-100 transition">
                    📅 Réserver
                </button>
                <button (click)="chatbotService.executerAction({label: 'Aide', type: 'function', data: 'aide'})"
                    class="flex-shrink-0 px-3 py-1 bg-purple-50 text-purple-600 rounded-full text-xs font-medium hover:bg-purple-100 transition">
                    ❓ Aide
                </button>
                <button (click)="reinitialiser()"
                    class="flex-shrink-0 px-3 py-1 bg-gray-50 text-gray-600 rounded-full text-xs font-medium hover:bg-gray-100 transition">
                    🔄 Réinitialiser
                </button>
            </div>
        </div>

        <!-- Input -->
        <div class="p-4 bg-white border-t border-gray-200 rounded-b-2xl">
            <div class="flex gap-2">
                <input type="text" [(ngModel)]="messageInput" (keypress)="onKeyPress($event)"
                    placeholder="Tapez votre message..."
                    class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary text-sm">
                <button (click)="envoyerMessage()" [disabled]="!messageInput.trim()"
                    class="bg-gradient-to-r from-primary to-secondary text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                    ➤
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-2 text-center">
                Appuyez sur Entrée pour envoyer
            </p>
        </div>
    </div>
</div>
