<aside class="w-64 bg-primary flex flex-col h-full">

  <!-- Logo -->
  <div class="px-6 py-5 border-b border-blue-800">
    <h1 class="text-white text-xl font-bold">CampusHub</h1>
    <p class="text-blue-300 text-xs mt-0.5">Panneau Admin</p>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-4 py-6 space-y-1">
    <a *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="bg-white bg-opacity-20 text-white"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-blue-200 hover:bg-white hover:bg-opacity-10 transition text-sm font-medium cursor-pointer">
      <span class="text-lg">{{ item.icon }}</span>
      {{ item.label }}
    </a>
  </nav>

  <!-- Bottom -->
  <div class="px-6 py-4 border-t border-blue-800">
    <p class="text-blue-400 text-xs">© 2025 ENICarthage</p>
  </div>

</aside>
