<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
      <div>
        <h2 class="text-primary font-bold text-lg">Administration</h2>
        <p class="text-gray-400 text-xs">ENICarthage CampusHub</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <p class="text-sm font-medium text-gray-700">{{ currentUser?.prenom }} {{ currentUser?.nom }}</p>
          <p class="text-xs text-gray-400">Administrateur</p>
        </div>
        <div class="w-9 h-9 bg-primary rounded-full flex items-center justify-center text-white font-bold text-sm">
          {{ currentUser?.prenom?.charAt(0) }}{{ currentUser?.nom?.charAt(0) }}
        </div>
        <button (click)="logout()"
          class="bg-red-50 text-red-500 hover:bg-red-100 text-sm px-4 py-2 rounded-lg transition font-medium">
          Déconnexion
        </button>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-auto p-6">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
