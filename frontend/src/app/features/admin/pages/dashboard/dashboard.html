<div class="space-y-6">
  <div>
    <h2 class="text-2xl font-bold text-primary">Tableau de bord</h2>
    <p class="text-gray-400 text-sm mt-1">Bienvenue sur le panneau d'administration</p>
  </div>

  <!-- KPI Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
    <div *ngFor="let kpi of kpis"
      class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-md transition">
      <div [class]="'w-12 h-12 rounded-xl flex items-center justify-center text-2xl ' + kpi.color">
        {{ kpi.icon }}
      </div>
      <div>
        <p class="text-2xl font-bold text-gray-800">{{ kpi.value }}</p>
        <p class="text-sm text-gray-500">{{ kpi.label }}</p>
      </div>
    </div>
  </div>

  <!-- Pending Events -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold text-primary">Événements en attente</h3>
      <span class="bg-yellow-100 text-yellow-700 text-xs font-medium px-3 py-1 rounded-full">
        {{ pendingEvents.length }} en attente
      </span>
    </div>
    <div class="space-y-3">
      <div *ngFor="let event of pendingEvents"
        class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-primary bg-opacity-10 rounded-xl flex items-center justify-center text-lg">📅</div>
          <div>
            <p class="font-semibold text-gray-800 text-sm">{{ event.titre }}</p>
            <p class="text-xs text-gray-500">{{ event.club }} — {{ event.date }}</p>
          </div>
        </div>
        <div class="flex gap-2">
          <button class="bg-green-500 text-white text-xs px-4 py-2 rounded-lg hover:bg-green-600 transition font-medium">
            ✓ Approuver
          </button>
          <button class="bg-red-500 text-white text-xs px-4 py-2 rounded-lg hover:bg-red-600 transition font-medium">
            ✗ Rejeter
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
