<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-primary">Gestion des Clubs</h2>
      <p class="text-gray-400 text-sm mt-1">Gérez les clubs et associations</p>
    </div>
    <button class="bg-primary text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-800 transition">
      + Nouveau club
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div *ngFor="let club of clubs"
      class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition">
      <div class="flex items-start justify-between mb-4">
        <div class="w-12 h-12 bg-primary bg-opacity-10 rounded-xl flex items-center justify-center text-2xl">🎯</div>
        <span [class]="'text-xs font-medium px-3 py-1 rounded-full ' + getStatusClass(club.status)">
          {{ club.status }}
        </span>
      </div>
      <h3 class="font-bold text-gray-800 mb-1">{{ club.nom }}</h3>
      <p class="text-sm text-gray-500 mb-1">👤 {{ club.responsable }}</p>
      <p class="text-sm text-gray-500 mb-1">👥 {{ club.membres }} membres</p>
      <p class="text-sm text-gray-500 mb-4">🏷️ {{ club.categorie }}</p>
      <div class="flex gap-2 pt-4 border-t border-gray-100">
        <button *ngIf="club.status === 'EN_ATTENTE'" (click)="approuver(club)"
          class="flex-1 bg-green-500 text-white text-xs py-2 rounded-lg hover:bg-green-600 transition font-medium">
          ✓ Approuver
        </button>
        <button *ngIf="club.status === 'ACTIF'" (click)="suspendre(club)"
          class="flex-1 bg-red-50 text-red-500 text-xs py-2 rounded-lg hover:bg-red-100 transition font-medium">
          Suspendre
        </button>
        <button class="flex-1 bg-gray-50 text-gray-600 text-xs py-2 rounded-lg hover:bg-gray-100 transition font-medium">
          Voir détails
        </button>
      </div>
    </div>
  </div>
</div>
