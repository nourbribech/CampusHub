<div class="space-y-6">
  <div>
    <h2 class="text-2xl font-bold text-primary">Réservations de salles</h2>
    <p class="text-gray-400 text-sm mt-1">Gérez les demandes de réservation</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Salle</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Demandeur</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Date & Heure</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Motif</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Statut</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let r of reservations" class="hover:bg-gray-50 transition">
          <td class="px-6 py-4 font-medium text-gray-800 text-sm">🏫 {{ r.salle }}</td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ r.demandeur }}</td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ r.date }}<br><span class="text-xs text-gray-400">{{ r.heure }}</span></td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ r.motif }}</td>
          <td class="px-6 py-4">
            <span *ngIf="r.status === 'EN_ATTENTE'" class="bg-yellow-100 text-yellow-700 text-xs font-medium px-3 py-1 rounded-full">En attente</span>
            <span *ngIf="r.status === 'APPROUVEE'" class="bg-green-100 text-green-700 text-xs font-medium px-3 py-1 rounded-full">✓ Approuvée</span>
            <span *ngIf="r.status === 'REJETEE'" class="bg-red-100 text-red-700 text-xs font-medium px-3 py-1 rounded-full">✗ Rejetée</span>
          </td>
          <td class="px-6 py-4">
            <div *ngIf="r.status === 'EN_ATTENTE'" class="flex gap-2">
              <button (click)="approuver(r)" class="bg-green-500 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-green-600 transition">✓</button>
              <button (click)="rejeter(r)" class="bg-red-500 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-red-600 transition">✗</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
