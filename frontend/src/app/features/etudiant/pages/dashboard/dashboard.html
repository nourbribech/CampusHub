<div class="dashboard-container">
  <h1>👋 Tableau de bord - Étudiant</h1>

  <div class="row g-4">
    <!-- Stats Cards -->
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="text-primary">{{ clubs.length }}</h5>
          <p class="card-text">Clubs actifs</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="text-success">{{ evenements.length }}</h5>
          <p class="card-text">Événements à venir</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="text-warning">{{ demandes.length }}</h5>
          <p class="card-text">Demandes en cours</p>
        </div>
      </div>
    </div>
  </div>

  <h2 class="mt-5">Derniers événements</h2>
  <div class="row" *ngIf="!loading; else loadingTpl">
    <div class="col-md-4" *ngFor="let event of evenements">
      <div class="card h-100">
        <div class="card-body">
          <h5>{{ event.title }}</h5>
          <p class="text-muted small">{{ event.date | date:'short' }}</p>
          <button class="btn btn-primary btn-sm w-100"
                  (click)="register(event.id)">
            S'inscrire
          </button>
        </div>
      </div>
    </div>
  </div>

  <ng-template #loadingTpl>
    <p class="text-center">Chargement...</p>
  </ng-template>
</div>
